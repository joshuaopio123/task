<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Genesis Cafe </title>
  <header>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
    
      background: wheat;
      min-height: 50vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .form-container {
      background: lightblue;
      padding: 40px 30px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
      width: 100%;
      max-width: 400px;
    }

    .logo {
      text-align: center;
      margin-bottom: 10px;
      font-size: 32px;
      font-weight: bold;
      color: grey;
    }

    h2 {
      text-align: center;
      color: black
      margin-bottom: 8px;
    }

    p {
      text-align: center;
      color: #4a071a;
      margin-bottom: 30px;
      font-size: 15px;
    }

    .form-group {
      margin-bottom: 18px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-weight: 500px;
      color: #e2c0c0;
    }

    input {
      width: 100%;
      padding: 3px;
      border: 1px solid rgb(34, 10, 10);
      border-radius: 8px;
      font-size: 16px;
    }

    
    

    .checkbox {
      display: flex;
      align-items: center;
      gap: 4px;
      margin: 0px 0;
      font-size: 10px;
    }

    button {
      width: 80%;
      padding: 15px;
      background: green;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
transition:0.2s;
    }

    button:hover {
      background: rgb(27, 63, 101);
      transform: scale(1.1);
    }
    








    
  </style>



<body>

  <div class="form-container">
    <div class="logo">
      <h1>Genesis coffee cafe☕</h1>
    
    <p>Get your orders delivered within time</p>
</div>
    <form action="#" method="POST">
      <div class="form-group">
        <label>Full Name </label>
        <input type="text" name="name" placeholder="" required>
      </div>

      <div class="form-group">
        <label>Email Address </label>
        <input type="email" name="email" placeholder="@gmail.com" required>
      </div>

      <div class="form-group">
        <label>Phone Number </label>
        <input type="tel" name="phone" placeholder="+256 " required>
      </div>

      

      <div class="checkbox">
        <input type="checkbox" id="terms" required>
        <label for="terms">
          I agree to the <a href="#" style="color:wheat;">Terms & Privacy Policy</a>
        </label>
      </div>

      <button type="submit">sign in</button>
    </form>

    <div class="login-link">
      Already have an account? <a href="">Sign in</a>
    </div>
  </div>

</body>
</html>
